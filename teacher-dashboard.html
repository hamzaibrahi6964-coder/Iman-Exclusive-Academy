<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <a href="index.html" class="brand">
    <img src="iman logo.jpg">
    <div>
      <h3>Iman Exclusive Academy</h3>
      <span>Teacher Dashboard</span>
    </div>
  </a>

  <nav id="navMenu">
    <a href="portal.html">Portal</a>
    <a href="index.html" class="portal-link">Logout</a>
  </nav>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</header>

<section class="dashboard-hero">
  <h1>Teacher Panel</h1>
  <p>Upload results and analyze student performance</p>
</section>

<section class="dashboard-section">

  <div class="result-box">
    <h2>Upload Student Result</h2>

    <!-- CLASS -->
    <select id="classSelect">
      <option value="">Select Class</option>
      <option>Primary 1</option>
      <option>Primary 2</option>
      <option>Primary 3</option>
    </select>

    <!-- STUDENT -->
    <select id="studentSelect">
      <option value="">Select Student</option>
      <option>Ahmad Musa</option>
      <option>Aisha Musa</option>
    </select>

    <!-- TABLE -->
    <table>
      <tr>
        <th>Subject</th>
        <th>CA</th>
        <th>Exam</th>
        <th>Total</th>
      </tr>

      <tr>
        <td>Mathematics</td>
        <td><input type="number" class="ca"></td>
        <td><input type="number" class="exam"></td>
        <td class="total">0</td>
      </tr>

      <tr>
        <td>English</td>
        <td><input type="number" class="ca"></td>
        <td><input type="number" class="exam"></td>
        <td class="total">0</td>
      </tr>

      <tr>
        <td>Science</td>
        <td><input type="number" class="ca"></td>
        <td><input type="number" class="exam"></td>
        <td class="total">0</td>
      </tr>

      <tr>
        <td>Social Studies</td>
        <td><input type="number" class="ca"></td>
        <td><input type="number" class="exam"></td>
        <td class="total">0</td>
      </tr>

    </table>

    <button onclick="calculateTotals()">Calculate</button>
    <button onclick="saveResult()">Save Result</button>
    <button onclick="analyzeResult()">AI Analyze</button>

  </div>

  <div class="ai-report" id="aiBox" style="display:none;">
    <h2>AI Analysis</h2>
    <p id="aiSummary"></p>
  </div>

</section>

<footer class="footer">
  <p>© 2026 Iman Exclusive Academy</p>
</footer>

<script>

function toggleMenu(){
  document.getElementById("navMenu").classList.toggle("active");
}

/* CALCULATE TOTALS */
function calculateTotals(){
  let rows = document.querySelectorAll("table tr");

  rows.forEach((row, index) => {
    if(index === 0) return;

    let ca = parseInt(row.querySelector(".ca").value) || 0;
    let exam = parseInt(row.querySelector(".exam").value) || 0;

    row.querySelector(".total").innerText = ca + exam;
  });
}

/* SAVE RESULT */
function saveResult(){

  let student = document.getElementById("studentSelect").value;
  let cls = document.getElementById("classSelect").value;

  if(!student || !cls){
    alert("Select class and student first");
    return;
  }

  alert("Result saved successfully for " + student);

}

/* AI ANALYSIS */
function analyzeResult(){

  let totals = document.querySelectorAll(".total");

  let sum = 0;
  let count = 0;

  totals.forEach(cell => {
    let val = parseInt(cell.innerText) || 0;
    sum += val;
    count++;
  });

  let avg = sum / count;

  let message = "";

  if(avg >= 70){
    message = "Excellent performance";
  } else if(avg >= 50){
    message = "Average performance";
  } else {
    message = "Needs serious improvement";
  }

  document.getElementById("aiSummary").innerText =
    message + " | Average: " + avg.toFixed(1) + "%";

  document.getElementById("aiBox").style.display = "block";

}

</script>

</body>
</html>
